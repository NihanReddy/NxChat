<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | NxChat</title>
    <meta name="description" content="Recover your NxChat account safely.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="bg-ambient"></div>

    <header>
        <div class="logo">NxChat</div>
        <div class="nav-actions">
            <button class="icon-button" aria-label="Toggle Theme" id="themeToggle">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 9.6 9.6A9 9 0 1 1 12 3z"/>
                </svg>
            </button>
            <a href="help.html" class="nav-link">Help</a>
        </div>
    </header>

    <main>
        <div class="hero-content">
            <h1>Recover <br><span class="gradient-text">Identity.</span></h1>
            <p class="hero-description">Lost in the grid? Let's restore your synaptic connection. Enter your registered email to receive a recovery code.</p>
        </div>

        <div class="auth-card">
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email and we'll send you a verification code</p>
            
            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" placeholder="name@example.com" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Send Code</button>
            </form>
            
            <div class="bottom-info" style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 24px;">
                Remembered your password? <a href="login.html">Sign In</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="copyright">&copy; 2024 NxChat. Precision in Every Message.</div>
    </footer>

    <script src="auth.js"></script>
</body>
</html>
