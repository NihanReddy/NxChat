<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | NxChat</title>
    <meta name="description" content="Securely reset your password and restore access to the grid.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
    <style>
        .grid-otp { display: flex; gap: 12px; margin: 32px 0; justify-content: center; }
        .otp-input { width: 44px; height: 56px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 12px; text-align: center; font-size: 24px; font-weight: 600; color: #fff; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .otp-input:focus { border-color: var(--primary); outline: none; background: rgba(255, 255, 255, 0.1); transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(64, 242, 254, 0.4); }
    </style>
</head>
<body>
    <div class="bg-ambient"></div>

    <header>
        <div class="logo">NxChat</div>
        <div class="nav-actions">
            <button class="icon-button" aria-label="Toggle Theme" id="themeToggle">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 9.6 9.6A9 9 0 1 1 12 3z"/>
                </svg>
            </button>
            <a href="help.html" class="nav-link">Help</a>
        </div>
    </header>

    <main>
        <div class="hero-content">
            <h1>Reset <br><span class="gradient-text">Sync Code.</span></h1>
            <p class="hero-description">The final phase of the recovery protocol. Enter the code we transmitted and establish your new secure credentials.</p>
        </div>

        <div class="auth-card">
            <h2>Establish New Password</h2>
            <p class="subtitle">Enter the 6-digit code and choose a new password</p>
            
            <form id="resetForm">
                <div class="grid-otp">
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="••••••••" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 32px;">
                    <label for="confirmNewPassword">Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Finalize Reset</button>
            </form>
            
            <div class="bottom-info" style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 24px;">
                Wait, I can remember it! <a href="login.html">Sign In</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="copyright">&copy; 2024 NxChat. Precision in Every Message.</div>
    </footer>

    <script src="auth.js"></script>
</body>
</html>
